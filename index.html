<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>poemas3</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        #start-btn { position: absolute; z-index: 999; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 20px 40px; background: #1e3a8a; color: white; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <button id="start-btn">Iniciar Experiencia AR</button>
    <a-scene id="scene" mindar-image="imageTargetSrc: https://raw.githubusercontent.com/inge7777/libro1modelo3d/main/libromaria222/portada1.mind" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false" style="display:none;">
        <a-assets>
            <a-asset-item id="model-0" src="https://raw.githubusercontent.com/instructorandradedcc/propuesta-AR/main/asetss/modelss/corazon.glb"></a-asset-item><a-asset-item id="model-1" src="https://raw.githubusercontent.com/instructorandradedcc/propuesta-AR/main/asetss/modelss/Robonaut-2.glb"></a-asset-item><a-asset-item id="model-2" src="https://raw.githubusercontent.com/instructorandradedcc/propuesta-AR/main/asetss/modelss/mano-iz-protesis.glb"></a-asset-item><a-asset-item id="model-3" src="https://raw.githubusercontent.com/instructorandradedcc/propuesta-AR/main/asetss/modelss/vehiculo1.glb"></a-asset-item><a-asset-item id="model-4" src="https://raw.githubusercontent.com/instructorandradedcc/propuesta-AR/main/asetss/modelss/super-nova-o-proteina.glb"></a-asset-item>
        </a-assets>
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        
            <a-entity mindar-image-target="targetIndex: 0">
                <a-gltf-model src="#model-0"></a-gltf-model>
            </a-entity>
            <a-entity mindar-image-target="targetIndex: 1">
                <a-gltf-model src="#model-1"></a-gltf-model>
            </a-entity>
            <a-entity mindar-image-target="targetIndex: 2">
                <a-gltf-model src="#model-2"></a-gltf-model>
            </a-entity>
            <a-entity mindar-image-target="targetIndex: 3">
                <a-gltf-model src="#model-3"></a-gltf-model>
            </a-entity>
            <a-entity mindar-image-target="targetIndex: 4">
                <a-gltf-model src="#model-4"></a-gltf-model>
            </a-entity>
    </a-scene>
    <script>
        document.getElementById('start-btn').onclick = function() {
            this.style.display = 'none';
            document.getElementById('scene').style.display = 'block';
        };
    </script>
</body>
</html>
